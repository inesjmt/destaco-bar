<script>
function showSection(id,btn){
  document.querySelectorAll('.menu-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  window.scrollTo(0,0);
}

/* ===== FUNCIÓN PINTAR ===== */
function pintar(lista,id,precio=false){
  const ul=document.getElementById(id);
  ul.innerHTML='';

  let categoriaActual='';

  lista.forEach(p=>{

    if(p.categoria && p.categoria!==categoriaActual){
      categoriaActual=p.categoria;

      ul.innerHTML+=`
        <li class="categoria-titulo">
          <h2>${categoriaActual}</h2>
        </li>`;
    }

    ul.innerHTML+=`
      <li>
        <div class="plato-linea">
          <span>${p.nombre}</span>
          ${precio?`<span class="precio">${p.precio}</span>`:''}
        </div>
        ${p.alergenos?`
        <div class="alergenos">
          ${p.alergenos.map(a=>`<img src="${ICONOS[a]}" class="icon-alergeno">`).join('')}
        </div>`:''}
      </li>`;
  });
}
